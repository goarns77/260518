<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forms</title>
</head>
<body>
    <h1>회원가입 폼</h1>
    <!-- 기본적인 인풋 -->
    <h2>기본 인풋</h2>
    <input/>
    <!-- form에도 속성이 있나? YES = 대표적으로 action = 데이터를 전송할 곳, method = 데이터를 전송하는 방식-->
    <!--method= get/post, get이 보편적-->
    <!--action= 서버에서 처리할 페이지 주소, 비어있으면 현재 페이지로 전송됨, 연결된 곳이 있으면 form 내 input들은 해당 주소로 전송됨-->
    <form action="" method="get">
        <!--폼 내 인풋-->
        <!--input에 name 태그를 안하면 데이터가 서버로 전달되지 않음-->
        <!--form으로 묶으면 input에서 enter를 쳐도 action 속성에 지정된 곳으로 전송됨-->
        <!--input의 속성을 설정하는 방법 1.name 2.label-->
        
        <h2>폼 인풋</h2>
        <input name = "username"/>
        <button>Submit</button>
        <br/>
        <label for="username1">유저이름:</label> <input name = "username" id="username1"/>
        <br/>
        <label for="username2">유저이름: <input name = "username" id="username2"/>
        <button>Submit</button></label>
        <!-- id=특정 요소에 단독으로 붙이는 이름, label for과 input id가 일치하면 label 클릭 시 input에 포커스-->
        <br/>
        <!--type = password 비밀번호, 이메일 등, 해당 타입 사용 시 내용이 블러 처리, 사전 입력을 원하면 placeholder 사용 
            placeholder 대신에 value 값으로 미리 값을 설정할 수 있음 -->
        <label for="password">비밀번호:</label> <input type="password" name = "password" id="password" placeholder="비밀번호를 입력하세요"/>
        <button>Submit</button></label>
        <hr>
        <!-- 큰 text input 여러 줄-->
         <textarea name="longtext">

         </textarea>
         <!-- 라디오 버튼 : 같은 name을 공유하여 여러 개 중 하나만 선택 가능 -->
         <input type="radio" name="gender" value="male"/>남
         <input type="radio" name="gender" value="female"/>여
         <button>Submit</button>
         <br/>
         <!--유사 옵션으로 select 태그로 여러 개 중 하나 또는 여러 개 선택 가능-->
         <select name="colors">
            <option value="red">빨강</option>
            <option value="blue">파랑</option>
            <option value="green">초록</option>
         </select>
         <!--checkbox 다중 선택 가능, 여러 개 인풋 시 사용 -->
         <input type="checkbox" name="hobbies" value="reading"/>독서
         <input type="checkbox" name="hobbies" value="music"/>음악
         <input type="checkbox" name="hobbies" value="sports"/>스포츠
         <button>Submit</button>
         <br/>
         <!--기타 input 타입-->
         <input type="color"/>색상
         <input type="date"/>날짜
         <input type="number"/>숫자
         <br/>
         <!-- input의 button = button태그와 동일한 기능 -->
         <input type="button" value="Button"/>
         <button>Button</button>
         <br/>
         

         
    </form>
</body>
</html>
