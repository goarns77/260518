<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 선택자</title>
    <style>
        /* 태그 선택자 
        태그명 {프로퍼티명: 프로퍼티값;}
        */
        p {
            color: gray;
        }
        .class-style1{
            color:green;
        }
        .class-style2{
            color:blue;
        }
        /* id 스타일 선택자
        #id명 {프로퍼티값:프로퍼티값;}
        id는 고유 속성이며, 클래스 선택자와 우선순위 비교 시 우선 적용되지만, 태그 선택자와 우선순위 비교 시 우선 적용되지 않음.

        적용 우선순위 : <p color=>, <p id="">, <p class="">
        */
    </style>
</head>
<body>
    <p>태그 선택자</p>
    <!-- 케밥 스타일로 클래스 명을 지정하면 해당 클래스를 가진 p 태그에만 적용, 클래스 선택자와 충돌 시 클래스 선택자가 적용됨 -->
    <p class="class-name">클래스 선택자</p>
    <!-- 클래스 선택자가 여러 개 적용될 경우, 나중에 적용된 클래스 선택자가 우선 적용 -->
    <p class="class-style1 class-style2">클래스 선택자 여러 개 적용</p>
    <p id="id-style1">id 선택자</p>
    <p style="color:aqua;">직접 지정</p>
    <P style="color:aqua;" id="id-style1" class="class-style1">다중 지정 시 우선도 보기</P>
</body>
</html>
